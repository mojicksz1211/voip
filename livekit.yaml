# Local hotel intercom — matches LIVEKIT_API_KEY / LIVEKIT_API_SECRET defaults in pbx-server
port: 7880
log_level: info

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false

keys:
  devkey: hotel-local-voip-livekit-dev-secret-32

room:
  empty_timeout: 120
  max_participants: 2
